<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FinTracker</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="./style.css" />
</head>

<body>

    <h1>💰 FinTracker Dashboard</h1>

    <!-- SUMMARY -->
    <div class="summary">
        <h3>Income: <span id="totalIncome">₹0</span></h3>
        <h3>Expense: <span id="totalExpense">₹0</span></h3>
        <h3>Balance: <span id="netBalance">₹0</span></h3>
        <h3>Top Category: <span id="topCategory">-</span></h3>
    </div>

    <!-- INSIGHT -->
    <div>
        <h2 id="insightText">Add transactions to see insights</h2>
    </div>

    <!-- CHART -->
    <canvas id="expenseChart"></canvas>

    <!-- FORM -->
    <form id="transactionForm">

        <input type="number" id="amount" placeholder="Amount" required />

        <input type="text" id="category" placeholder="Category" required />

        <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <input type="date" id="date" required />

        <input type="text" id="note" placeholder="Note" />

        <button type="submit">Add</button>
    </form>

    <!-- FILTER -->
    <select id="categoryFilter">
        <option value="all">All</option>
    </select>

    <!-- LIST -->
    <div id="transactionsList"></div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- SCRIPT -->
    <script src="./script.js"></script>

</body>
</html>
