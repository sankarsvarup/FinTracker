<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- PAGE TITLE -->

        <h1>💎 FinTracker</h1>

        <!-- SUMMARY DASHBOARD -->

        <div class="summary-grid">

            <div class="summary-card income-card">
                <h3>Total Income</h3>
                <p id="totalIncome">₹0</p>
            </div>

            <div class="summary-card expense-card">
                <h3>Total Expense</h3>
                <p id="totalExpense">₹0</p>
            </div>

            <div class="summary-card balance-card">
                <h3>Net Balance</h3>
                <p id="netBalance">₹0</p>
            </div>

            <div class="summary-card category-card">
                <h3>Top Category</h3>
                <p id="topCategory">-</p>
            </div>

        </div>

        <!-- ADD TRANSACTION -->

        <div class="form-card">

            <h2>Add Transaction</h2>

            <form id="transactionForm">

                <input
                    type="number"
                    id="amount"
                    placeholder="Amount"
                    required
                >

                <input
                    type="text"
                    id="category"
                    placeholder="Category"
                    required
                >

                <select id="type">

                    <option value="income">
                        Income
                    </option>

                    <option value="expense">
                        Expense
                    </option>

                </select>

                <input
                    type="date"
                    id="date"
                    required
                >

                <input
                    type="text"
                    id="note"
                    placeholder="Note (Optional)"
                >

                <button type="submit">
                    Add Transaction
                </button>

            </form>

        </div>

        <!-- CHART -->

        <div class="chart-card">

            <h2>📊 Spending Breakdown</h2>

            <canvas id="expenseChart"></canvas>

        </div>

        <!-- INSIGHT -->

        <div class="insight-card">

            <h2>💡 Financial Insight</h2>

            <p id="insightText">
                No insights available yet.
            </p>

        </div>

        <!-- FILTER -->

        <div class="filter-card">

            <h2>🔍 Filter Transactions</h2>

            <select id="categoryFilter">

                <option value="all">
                    All Categories
                </option>

            </select>

        </div>

        <!-- TRANSACTIONS -->

        <div class="transactions-card">

            <h2>📋 Recent Transactions</h2>

            <div id="transactionsList">

            </div>

        </div>

    </div>

    <!-- TOAST NOTIFICATION -->

    <div id="toast"></div>

    <!-- CHART JS -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- APP SCRIPT -->

    <script src="script.js"></script>

</body>

</html>
